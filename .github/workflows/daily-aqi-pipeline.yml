name: Daily AQI Pipeline

on:
  schedule:
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-aqi-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AQI Pipeline
        run: python pipelines/run_pipeline.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ pipelines/bulletins/ pipelines/*.csv
          git diff --staged --quiet || (git commit -m "chore: daily AQI data update $(date -u +%Y-%m-%d)" && git push)
